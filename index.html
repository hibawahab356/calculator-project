<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator project</title>
    <link rel="stylesheet" href="./bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="hero">
    <div id="main">
      
        <input type="text" id="data">
    
    </div>
    <div class="btnGroup">
          <div class="twobtns">
            <button type="button" class="btn btn-primary btn-lg px-4 me-md-2 Cbtn" id="btn">C</button>
         <button type="button" class="btn btn-success boxequal box operator" >/</button>
          </div>
        <div>
        <button type="button" class="btn btn-primary box numbers">7</button>
<button type="button" class="btn btn-secondary box numbers">8</button>
<button type="button" class="btn btn-success box numbers">9</button>
<button type="button" class="btn btn-danger box operator">*</button>
        </div>
          <div>
         <button type="button" class="btn btn-primary box numbers">4</button>
<button type="button" class="btn btn-secondary box numbers">5</button>
<button type="button" class="btn btn-success box numbers">6</button>
<button type="button" class="btn btn-danger box operator">-</button>
        </div>
          <div>
         <button type="button" class="btn btn-primary box numbers">1</button>
<button type="button" class="btn btn-secondary box numbers">2</button>
<button type="button" class="btn btn-success box numbers">3</button>
<button type="button" class="btn btn-danger box operator" >+</button>
        </div>
          <div>
         <button type="button" class="btn btn-primary box point">.</button>
<button type="button" class="btn btn-secondary box numbers">0</button>
 <button type="button" class="btn  " id="result">=</button>
        </div>
    </div>
</div>
</div>





    <script src="app.js"></script>
   <script src="./bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
